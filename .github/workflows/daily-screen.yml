name: Daily Stock Screen (Z哥选股)

on:
  schedule:
    # 每个交易日 21:00 UTC+8 = 13:00 UTC（北京时间晚上 9 点）
    # 周一到周五执行
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      strategy:
        description: "选股策略 (B1 / 完美图形 / 超级B1 / 建仓波 / 吸筹 / 安全 / 量比战法)"
        required: false
        default: "B1"
        type: choice
        options:
          - B1
          - 完美图形
          - 超级B1
          - 建仓波
          - 吸筹
          - 安全
          - 量比战法
      limit:
        description: "输出上限"
        required: false
        default: "20"
        type: string

jobs:
  daily-screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Prepare environment
        env:
          DATA_MODE: ${{ vars.DATA_MODE }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TUSHARE_API_URL: ${{ secrets.TUSHARE_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          DB_PATH: ${{ vars.DB_PATH }}
        run: |
          # 如果 DB_PATH 未设置，使用默认值
          DB_PATH="${DB_PATH:-data/stock_data.db}"
          echo "DATA_MODE=$DATA_MODE" >> .env
          echo "TUSHARE_TOKEN=$TUSHARE_TOKEN" >> .env
          echo "TUSHARE_API_URL=$TUSHARE_API_URL" >> .env
          echo "LLM_API_KEY=$LLM_API_KEY" >> .env
          echo "LLM_BASE_URL=$LLM_BASE_URL" >> .env
          echo "LLM_MODEL=$LLM_MODEL" >> .env
          echo "DB_PATH=$DB_PATH" >> .env
          echo "DATA_DIR=data" >> .env

      - name: Run daily screen
        id: screen
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'B1' }}"
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          echo "strategy=$STRATEGY" >> "$GITHUB_OUTPUT"
          echo "limit=$LIMIT" >> "$GITHUB_OUTPUT"

          zt screen --strategy "$STRATEGY" --limit "$LIMIT" --json > screen_result.json 2>&1 || true

          # 输出结果摘要
          echo "=== 选股结果 ==="
          cat screen_result.json || echo "(无结果)"

      - name: Upload screen result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screen-result-${{ github.run_id }}
          path: screen_result.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify via Feishu Webhook
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK 未配置，跳过飞书通知"
            exit 0
          fi

          STRATEGY="${{ steps.screen.outputs.strategy || 'B1' }}"
          LIMIT="${{ steps.screen.outputs.limit || '20' }}"
          TODAY=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="${{ job.status }}"

          # 读取选股结果，提取命中数量和前 10 只
          RESULT=$(cat screen_result.json 2>/dev/null || echo '{}')
          COUNT=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('count',0))" 2>/dev/null || echo "0")

          # 提取前 10 只股票摘要
          TOP10=$(echo "$RESULT" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              stocks = d.get('stocks', [])[:10]
              for s in stocks:
                  print(f\"{s['ts_code']} {s.get('name','')} | 评分:{s.get('score',0)} | {s.get('rating','')}\")
          except:
              print('(无结果)')
          " 2>/dev/null || echo "(无结果)")

          # 状态图标
          if [ "$STATUS" = "success" ]; then
              ICON="✅"
          else
              ICON="❌"
          fi

          # 构建飞书富文本消息
          CONTENT=$(cat <<EOF
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "${ICON} Z哥每日选股报告 ${TODAY} [${STRATEGY}]"
                },
                "template": "${STATUS}"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**日期**: ${TODAY}\n**策略**: ${STRATEGY}\n**命中**: ${COUNT} 只\n**状态**: ${STATUS}\n**运行**: [查看详情](${RUN_URL})"
                  }
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "### 选股结果 (前10)\n\`\`\`\n${TOP10}\n\`\`\`"
                  }
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "note",
                  "elements": [
                    {
                      "tag": "plain_text",
                      "content": "由 GitHub Actions 自动生成 | Z哥量化选股"
                    }
                  ]
                }
              ]
            }
          }
          EOF
          )

          # 发送到飞书
          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$CONTENT"

          echo ""
          echo "=== 飞书通知已发送 ==="

      - name: Notify via GitHub Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const strategy = '${{ steps.screen.outputs.strategy || 'B1' }}';
            const limit = '${{ steps.screen.outputs.limit || '20' }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let resultText = '';
            try {
              resultText = fs.readFileSync('screen_result.json', 'utf8');
            } catch (e) {
              resultText = '(无法读取结果文件)';
            }

            const today = new Date().toISOString().slice(0, 10);
            const title = `📊 每日选股报告 ${today} [${strategy}]`;

            const body = [
              `## Z哥每日选股报告`,
              ``,
              `- 日期: ${today}`,
              `- 策略: ${strategy}`,
              `- 上限: ${limit}`,
              `- 工作流: [查看运行详情](${runUrl})`,
              ``,
              `### 选股结果`,
              ``,
              '```json',
              resultText || '(无结果)',
              '```',
              ``,
              `> 由 GitHub Actions 自动生成`,
            ].join('\n');

            // 查找今天是否已有同名 issue，有则评论，无则创建
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'daily-screen',
              state: 'open',
              per_page: 5,
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['daily-screen'],
              });
            }
