name: Daily Stock Screen (Z哥选股)

on:
  push:
    branches: [main]
  schedule:
    # 每个交易日 21:00 UTC+8 = 13:00 UTC（北京时间晚上 9 点）
    # 周一到周五执行
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      strategy:
        description: "选股策略 (B1 / 完美图形 / 超级B1 / 建仓波 / 吸筹 / 安全 / 量比战法)"
        required: false
        default: "B1"
        type: choice
        options:
          - B1
          - 完美图形
          - 超级B1
          - 建仓波
          - 吸筹
          - 安全
          - 量比战法
      limit:
        description: "输出上限"
        required: false
        default: "20"
        type: string

jobs:
  daily-screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run daily screen (online)
        id: screen
        env:
          DATA_MODE: akshare
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'B1' }}"
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          echo "strategy=$STRATEGY" >> "$GITHUB_OUTPUT"

          python scripts/online_screen.py --strategy "$STRATEGY" --limit "$LIMIT" --json > screen_result.json 2>screen_log.txt || true

          echo "=== 选股日志 ==="
          tail -5 screen_log.txt
          echo "=== 选股结果 ==="
          cat screen_result.json || echo "(无结果)"

      - name: Notify via Feishu
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK_URL 未配置，跳过飞书通知"
            exit 0
          fi

          STRATEGY="${{ steps.screen.outputs.strategy || 'B1' }}"
          TODAY=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="${{ job.status }}"

          RESULT=$(cat screen_result.json 2>/dev/null || echo '{}')
          COUNT=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('count',0))" 2>/dev/null || echo "0")

          TOP10=$(echo "$RESULT" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              for s in d.get('stocks', [])[:10]:
                  print(f\"{s['ts_code']} {s.get('name','')} | 评分:{s.get('score',0)} | {s.get('rating','')}\")
          except:
              print('(无结果)')
          " 2>/dev/null || echo "(无结果)")

          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")

          cat <<EOF | curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d @-
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": { "tag": "plain_text", "content": "${ICON} Z哥每日选股 ${TODAY} [${STRATEGY}]" },
                "template": "${STATUS}"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**日期**: ${TODAY}\n**策略**: ${STRATEGY}\n**命中**: ${COUNT} 只\n**状态**: ${STATUS}\n**运行**: [查看详情](${RUN_URL})"
                  }
                },
                { "tag": "hr" },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "### 选股结果 (前10)\n\`\`\`\n${TOP10}\n\`\`\`"
                  }
                },
                { "tag": "hr" },
                {
                  "tag": "note",
                  "elements": [{ "tag": "plain_text", "content": "GitHub Actions 自动生成 | Z哥量化选股" }]
                }
              ]
            }
          }
          EOF

          echo ""
          echo "=== 飞书通知已发送 ==="
